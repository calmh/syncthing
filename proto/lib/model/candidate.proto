syntax = "proto3";

package model;

message SharingDeviceEntry {
    bytes device = 1;
    int64 when   = 2;
}

message SharingFolderEntry {
    string                      folder  = 1;
    repeated SharingDeviceEntry devices = 2;
}

message SharingCandidates {
    repeated SharingFolderEntry folders = 1;
}

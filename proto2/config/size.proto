syntax = "proto3";

package config;
option go_package = "syncthing.net/proto2/config";

import "repos/protobuf/gogoproto/gogo.proto";

import "ext.proto";

message Size {
    option (gogoproto.goproto_stringer) = false;

    double value = 1 [(ext.xml) = ",chardata"];
    string unit  = 2 [(ext.xml) = "unit,attr"];
}
